<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="card" style="max-width:600px; margin:auto; margin-top:60px;">

        <h1>Create Account</h1>

        <div id="registerMessage"></div>

        <form id="registerForm">

            <label>Username</label>

            <br><br>

            <input
                type="text"
                name="username"
                id="username"
                required
                style="width:100%;padding:12px;">

            <br><br>

            <label>Email</label>

            <br><br>

            <input
                type="email"
                name="email"
                id="email"
                required
                style="width:100%;padding:12px;">

            <br><br>

            <label>Password</label>

            <br><br>

            <input
                type="password"
                name="password"
                id="password"
                required
                style="width:100%;padding:12px;">

            <br><br>

            <button
                type="submit"
                id="registerBtn"
                style="width:100%;">

                Register

            </button>

        </form>

        <br>

        <p style="text-align:center;">

            Already have an account?

            <a href="/login">

                Login Here

            </a>

        </p>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
